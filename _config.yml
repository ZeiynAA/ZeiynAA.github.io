title: "zeiyn.com"
description: "The personal website of Zeiyn — projects, writing, and ways to get in touch."
url: "https://zeiyn.com"
author:
  name: "Zeiyn"

timezone: Etc/UTC
markdown: kramdown

# Posts (Markdown in _posts/) automatically get the post layout, the Writing nav
# highlight, and a clean /posts/<slug>/ URL. permalink is scoped HERE (to posts)
# rather than globally, so regular pages keep their .html URLs and match the nav.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      nav: writing
      og_type: article
      permalink: /posts/:title/

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .github
